name: Check Files

on: [push]

jobs:
check:
runs-on: windows-latest
steps:
- uses: actions/checkout@v4

- name: Check files exist
run: |
echo "Checking files..."
if exist "Program.cs" (echo ✅ Program.cs found) else (echo ❌ Program.cs missing)
if exist "Chatbot.cs" (echo ✅ Chatbot.cs found) else (echo ❌ Chatbot.cs missing)
if exist "ResponseManager.cs" (echo ✅ ResponseManager.cs found) else (echo ❌ ResponseManager.cs missing)
if exist "UIHelper.cs" (echo ✅ UIHelper.cs found) else (echo ❌ UIHelper.cs missing)
if exist "VoiceGreeting.cs" (echo ✅ VoiceGreeting.cs found) else (echo ❌ VoiceGreeting.cs missing)
if exist "*.csproj" (echo ✅ Project file found) else (echo ❌ No .csproj file found)
uration=Release
    
    - name: Run tests (if any)
      run: dotnet test --no-build --verbosity normal
